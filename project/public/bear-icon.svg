<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1530"/>
      <stop offset="50%" stop-color="#0f1d3a"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="512" height="512" rx="100"/>
    </clipPath>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Stars -->
  <g clip-path="url(#round)">
    <circle cx="80" cy="60" r="2" fill="white" opacity="0.8"/>
    <circle cx="150" cy="40" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="220" cy="70" r="2" fill="white" opacity="0.7"/>
    <circle cx="300" cy="50" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="380" cy="80" r="2" fill="white" opacity="0.8"/>
    <circle cx="440" cy="50" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="60" cy="120" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="120" cy="100" r="1" fill="white" opacity="0.4"/>
    <circle cx="200" cy="130" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="350" cy="110" r="1" fill="white" opacity="0.4"/>
    <circle cx="420" cy="140" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="100" cy="180" r="1" fill="white" opacity="0.3"/>
    <circle cx="280" cy="160" r="1" fill="white" opacity="0.3"/>
    <circle cx="400" cy="200" r="1" fill="white" opacity="0.3"/>
    <circle cx="50" cy="200" r="1.5" fill="white" opacity="0.4"/>
    <circle cx="180" cy="200" r="1" fill="white" opacity="0.3"/>
    <circle cx="320" cy="220" r="1" fill="white" opacity="0.3"/>
    <circle cx="460" cy="180" r="1.5" fill="white" opacity="0.4"/>
  </g>

  <!-- Chef's toque (hat) -->
  <ellipse cx="256" cy="80" rx="70" ry="35" fill="#f5f0e0"/>
  <ellipse cx="220" cy="65" rx="30" ry="25" fill="#fff"/>
  <ellipse cx="292" cy="65" rx="30" ry="25" fill="#fff"/>
  <ellipse cx="256" cy="55" rx="35" ry="28" fill="#fff"/>
  <rect x="186" y="95" width="140" height="20" rx="5" fill="#e8e0d0"/>

  <!-- Bear ears -->
  <circle cx="180" cy="200" r="40" fill="#7B5E3F"/>
  <circle cx="332" cy="200" r="40" fill="#7B5E3F"/>
  <circle cx="180" cy="200" r="22" fill="#C4A576"/>
  <circle cx="332" cy="200" r="22" fill="#C4A576"/>

  <!-- Bear head -->
  <ellipse cx="256" cy="290" rx="120" ry="110" fill="#8B6B47"/>

  <!-- Muzzle -->
  <ellipse cx="256" cy="340" rx="65" ry="55" fill="#D4B896"/>

  <!-- Nose -->
  <ellipse cx="256" cy="320" rx="18" ry="13" fill="#3D2B1C"/>

  <!-- Mouth -->
  <path d="M 238 355 Q 256 372 274 355" stroke="#3D2B1C" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Left eye (open) -->
  <circle cx="210" cy="275" r="13" fill="#3D2B1C"/>
  <circle cx="214" cy="271" r="4" fill="white"/>

  <!-- Right eye (winking) -->
  <path d="M 285 275 Q 300 265 315 275" stroke="#3D2B1C" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Left paw (waving with wooden spoon) -->
  <g transform="rotate(-20, 140, 360)">
    <ellipse cx="140" cy="370" rx="30" ry="38" fill="#8B6B47"/>
    <circle cx="130" cy="355" r="6" fill="#5C4A32"/>
    <circle cx="148" cy="350" r="6" fill="#5C4A32"/>
    <circle cx="138" cy="365" r="6" fill="#5C4A32"/>
    <!-- Wooden spoon -->
    <ellipse cx="115" cy="320" rx="12" ry="18" fill="#C4A062" transform="rotate(-15 115 320)"/>
    <rect x="120" y="310" width="6" height="40" rx="2" fill="#D4B080" transform="rotate(-15 123 330)"/>
  </g>

  <!-- Right paw (resting) -->
  <ellipse cx="372" cy="380" rx="30" ry="34" fill="#8B6B47"/>
</svg>
